name: FlashORM-Testcase

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version: '1.23.x'
        cache: true

    - name: Download dependencies
      run: go mod tidy

    - name: Run unit tests
      run: go test -tags dev -v -race -timeout 5m ./internal/... ./template/...

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_USER: testuser
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: testdb
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u testuser -ptestpass"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 3306:3306

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version: '1.23.x'
        cache: true

    - name: Download dependencies
      run: go mod tidy

    - name: Build flash binary
      run: |
        go build -tags="dev,plugins" -o flash .
        chmod +x flash

    - name: Verify binary
      run: ./flash --version

    - name: Grant MySQL privileges
      run: |
        mysql -h 127.0.0.1 -u root -prootpass \
          -e "GRANT ALL PRIVILEGES ON *.* TO 'testuser'@'%' WITH GRANT OPTION; FLUSH PRIVILEGES;"

    - name: Run integration tests
      env:
        CI: true
        POSTGRES_URL: postgres://testuser:testpass@localhost:5432/testdb?sslmode=disable
        MYSQL_URL: mysql://testuser:testpass@tcp(localhost:3306)/testdb
        SQLITE_URL: sqlite://./test.db
      run: |
        cd test/integration
        go test -tags="dev,plugins" -v -timeout 30m ./...
